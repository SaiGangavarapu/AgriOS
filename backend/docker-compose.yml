services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: agrios
      POSTGRES_USER: agrios
      POSTGRES_PASSWORD: agrios_dev_password
    ports:
      - "5432:5432"
    volumes:
      - agrios_backend_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrios -d agrios"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/agrios
      DB_USERNAME: agrios
      DB_PASSWORD: agrios_dev_password
      SECURITY_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  agrios_backend_pg_data:
