spring:
  application:
    name: agrios-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrios}
    username: ${DB_USERNAME:agrios}
    password: ${DB_PASSWORD:agrios_dev_password}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  modulith:
    events:
      republish-outstanding-events-on-restart: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,flyway
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

agrios:
  security:
    enabled: ${SECURITY_ENABLED:true}
    jwt-secret: ${JWT_SECRET:change-this-development-secret-at-least-32-bytes}
    issuer: ${JWT_ISSUER:agrios}

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-}]"
