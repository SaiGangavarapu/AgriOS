spring:
  application:
    name: agrios-backend
  ai:
    model:
      chat: ${SPRING_AI_CHAT_MODEL:none}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2:3b}
          temperature: ${OLLAMA_TEMPERATURE:0.2}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agrios}
    username: ${DB_USERNAME:agrios}
    password: ${DB_PASSWORD:agrios_dev_password}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  modulith:
    events:
      republish-outstanding-events-on-restart: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,flyway
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

agrios:
  ai:
    max-input-characters: ${AI_MAX_INPUT_CHARACTERS:12000}
    max-output-characters: ${AI_MAX_OUTPUT_CHARACTERS:16000}
    history-limit: ${AI_HISTORY_LIMIT:20}
    timeout: ${AI_PROVIDER_TIMEOUT:60s}
    transient-retries: ${AI_TRANSIENT_RETRIES:1}
    ollama:
      enabled: ${AGRIOS_AI_OLLAMA_ENABLED:false}
    mock:
      enabled: ${AGRIOS_AI_MOCK_ENABLED:false}
    openai:
      enabled: ${AGRIOS_AI_OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_CHAT_MODEL:gpt-4.1-mini}
  security:
    enabled: ${SECURITY_ENABLED:true}
    jwt-secret: ${JWT_SECRET:change-this-development-secret-at-least-32-bytes}
    issuer: ${JWT_ISSUER:agrios}

logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-}]"
